<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Campaign Admin Login</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.06);
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --border:rgba(255,255,255,.14);
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 18px;
      --accent:#7c3aed;
      --accent2:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 20% -10%, rgba(124,58,237,.45), transparent 55%),
        radial-gradient(900px 500px at 90% 10%, rgba(34,197,94,.30), transparent 50%),
        radial-gradient(900px 600px at 50% 120%, rgba(59,130,246,.25), transparent 55%),
        var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px;
    }
    .wrap{width:100%; max-width:720px;}
    .brand{
      display:flex; align-items:center; gap:12px;
      margin-bottom:18px;
    }
    .logo{
      width:44px; height:44px; border-radius:14px;
      background: linear-gradient(135deg, rgba(124,58,237,.9), rgba(34,197,94,.75));
      box-shadow: 0 10px 25px rgba(0,0,0,.25);
    }
    h1{margin:0; font-size:26px; letter-spacing:.2px;}
    .subtitle{color:var(--muted); margin-top:6px; font-size:14px; line-height:1.4;}
    .card{
      background: linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding:22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    label{display:block; margin:14px 0 8px; font-size:13px; color:var(--muted);}
    input{
      width:100%;
      padding:12px 12px;
      border:1px solid var(--border);
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
    }
    input:focus{border-color: rgba(124,58,237,.7); box-shadow: 0 0 0 4px rgba(124,58,237,.20);}
    .row{display:flex; gap:12px; align-items:center; justify-content:space-between; margin-top:16px;}
    button{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(135deg, rgba(124,58,237,.9), rgba(124,58,237,.65));
      color:#fff;
      padding:12px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.2px;
      box-shadow: 0 12px 30px rgba(124,58,237,.20);
    }
    button:hover{filter:brightness(1.06)}
    .meta{color:var(--muted); font-size:13px; margin-top:14px; line-height:1.45;}
    .err{
      margin-top:12px;
      padding:12px;
      border-radius: 14px;
      background: rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.25);
      color:#fecaca;
      font-size:13px;
    }
    .hint{margin-top:10px; color:var(--muted); font-size:12.5px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>Campaign Admin</h1>
        <div class="subtitle">Secure login for submissions, endorsements, and donation tracking.</div>
      </div>
    </div>

    <div class="card">
      <form method="post" action="/admin/login">
        <input type="hidden" name="csrf" value="{{ csrf }}"/>
        <label>Username</label>
        <input name="username" autocomplete="username" required />
        <label>Password</label>
        <input name="password" type="password" autocomplete="current-password" required />

        <div class="row">
          <button type="submit">Log in</button>
          <div class="hint">Tip: set <b>ADMIN_USER</b> / <b>ADMIN_PASSWORD</b> in production.</div>
        </div>

        {% if error %}
          <div class="err">{{ error }}</div>
        {% endif %}
      </form>
    </div>

    <div class="meta">
      If you’re embedding public pages on Squarespace, keep admin pages private and behind login.
    </div>
  </div>
</body>
</html>
